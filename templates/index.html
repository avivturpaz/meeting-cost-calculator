<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meeting Cost Calculator</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.paddle.com/paddle/v2/paddle.js"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
  <div class="bg-white rounded-2xl shadow-lg p-8 w-full max-w-md">
    <h1 class="text-2xl font-bold text-gray-800 mb-1">Meeting Cost Calculator</h1>
    <p class="text-gray-500 text-sm mb-6">See how much your meeting is costing in real time.</p>

    <div class="space-y-4 mb-6">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Number of people</label>
        <input id="people" type="number" min="1" value="4"
          class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500" />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Average hourly rate per person ($)</label>
        <input id="rate" type="number" min="0" step="0.01" value="75"
          class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500" />
      </div>
    </div>

    <div class="bg-blue-50 rounded-xl p-6 mb-6 text-center">
      <p class="text-sm text-blue-600 font-medium mb-1">Total cost so far</p>
      <p id="cost-display" class="text-5xl font-bold text-blue-700">$0.00</p>
      <p id="timer-display" class="text-sm text-gray-500 mt-2">00:00:00</p>
    </div>

    <div class="flex gap-3 mb-4">
      <button id="start-btn" onclick="startMeeting()"
        class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 rounded-lg transition">
        Start
      </button>
      <button id="pause-btn" onclick="pauseMeeting()" disabled
        class="flex-1 bg-yellow-400 hover:bg-yellow-500 text-white font-semibold py-2 rounded-lg transition disabled:opacity-40">
        Pause
      </button>
      <button id="reset-btn" onclick="resetMeeting()"
        class="flex-1 bg-gray-200 hover:bg-gray-300 text-gray-700 font-semibold py-2 rounded-lg transition">
        Reset
      </button>
    </div>

    {% if paddle_price_id %}
    <button onclick="openCheckout()"
      class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-2 rounded-lg transition mt-2">
      Upgrade to Pro
    </button>
    {% endif %}
  </div>

  <script>
    let intervalId = null;
    let elapsedSeconds = 0;
    let running = false;

    {% if paddle_sandbox %}
    Paddle.Environment.set('sandbox');
    {% endif %}
    {% if paddle_price_id %}
    Paddle.Initialize({ token: '{{ paddle_price_id }}' });
    {% endif %}

    function getCostPerSecond() {
      const people = parseFloat(document.getElementById('people').value) || 0;
      const rate = parseFloat(document.getElementById('rate').value) || 0;
      return (people * rate) / 3600;
    }

    function updateDisplay() {
      const cost = elapsedSeconds * getCostPerSecond();
      document.getElementById('cost-display').textContent = '$' + cost.toFixed(2);
      const h = String(Math.floor(elapsedSeconds / 3600)).padStart(2, '0');
      const m = String(Math.floor((elapsedSeconds % 3600) / 60)).padStart(2, '0');
      const s = String(elapsedSeconds % 60).padStart(2, '0');
      document.getElementById('timer-display').textContent = `${h}:${m}:${s}`;
    }

    function startMeeting() {
      if (running) return;
      running = true;
      document.getElementById('start-btn').disabled = true;
      document.getElementById('pause-btn').disabled = false;
      intervalId = setInterval(() => {
        elapsedSeconds++;
        updateDisplay();
      }, 1000);
    }

    function pauseMeeting() {
      if (!running) return;
      running = false;
      clearInterval(intervalId);
      document.getElementById('start-btn').disabled = false;
      document.getElementById('pause-btn').disabled = true;
    }

    function resetMeeting() {
      pauseMeeting();
      if (elapsedSeconds > 0) {
        const people = parseFloat(document.getElementById('people').value) || 0;
        const rate = parseFloat(document.getElementById('rate').value) || 0;
        const total = elapsedSeconds * getCostPerSecond();
        fetch('/save-session', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ people, hourly_rate: rate, duration_seconds: elapsedSeconds, total_cost: total })
        });
      }
      elapsedSeconds = 0;
      updateDisplay();
    }

    function openCheckout() {
      Paddle.Checkout.open({ items: [{ priceId: '{{ paddle_price_id }}', quantity: 1 }] });
    }

    // Live recalculation when inputs change
    document.getElementById('people').addEventListener('input', updateDisplay);
    document.getElementById('rate').addEventListener('input', updateDisplay);
  </script>
</body>
</html>
